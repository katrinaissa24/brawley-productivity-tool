name: Release

# Cut a release by pushing a version tag, e.g.:
#   npm version patch        # bumps package.json + creates a git tag
#   git push && git push --tags
#
# This builds a signed universal macOS app, publishes a GitHub Release, and
# uploads the updater manifest (latest.json) the app polls for auto-updates.
on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write # needed to create the Release and upload assets

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Generated once with `npm run tauri signer generate` and stored as
          # repository secrets (see docs/RELEASING.md).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # Build a single universal binary that runs on both Apple Silicon and
          # Intel Macs. The updater's latest.json will point both darwin targets
          # at this one artifact.
          args: --target universal-apple-darwin
          tagName: ${{ github.ref_name }}
          releaseName: "Flow ${{ github.ref_name }}"
          releaseBody: "See the assets below to download and install."
          releaseDraft: false
          prerelease: false
